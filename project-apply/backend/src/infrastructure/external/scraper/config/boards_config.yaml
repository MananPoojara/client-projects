# 25 Job Boards Configuration
# Each board can use scraper_type: "scrapy" or "playwright"

boards:
  # Static job boards (use Scrapy)
  - board_id: "indeed"
    name: "Indeed"
    base_url: "https://www.indeed.com"
    scraper_type: "scrapy"
    throttle:
      delay_seconds: 2
      max_concurrency: 1
      max_retries: 3

